<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Roojai FNOL QA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }</style>
</head>
<body class="d-flex align-items-center py-4 bg-light" style="height: 100vh;">
<main class="form-signin w-100 m-auto" style="max-width: 350px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h3 class="text-center mb-4">Roojai FNOL QA</h3>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100 mt-3" type="submit">Log in</button>
      </form>
      {% if form.errors %}
        <p class="text-danger text-center mt-3">Invalid credentials. Please try again.</p>
      {% endif %}
    </div>
  </form>
</main>
</body>
</html>
